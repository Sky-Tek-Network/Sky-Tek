[tiny]
	#Energy storage size of the energy hatch.
	# Default: 2048
	# Range: > 1
	size = 204800
	#Defines the transfer limit for RF/FE things. 
	#IC2's transfer limit is defined by the voltage tier.
	# Default: 128
	# Range: > 1
	transfer_rate = 12800

